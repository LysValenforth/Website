<script>
document.addEventListener('DOMContentLoaded', () => {
  loadMhSection('movies',  'mhf-movies-grid',  6);
  loadMhSection('tvshows', 'mhf-tvshows-grid', 6);
  loadMhSection('beats',   'mhf-beats-grid',   9);
});
async function loadMhSection(category, gridId, max) {
  var grid = document.getElementById(gridId);
  if (!grid) return;
  if (typeof getMediaHubByCategory !== 'function') { grid.innerHTML='<p class="error-text" style="grid-column:1/-1;">Firebase not configured.</p>'; return; }
  try {
    var items = (await getMediaHubByCategory(category)).slice(0, max);
    grid.classList.remove('mhf-skeleton-grid');
    grid.innerHTML = '';
    if (!items.length) { grid.innerHTML='<p style="color:var(--text-muted,#8E8C85);font-family:\'EB Garamond\',serif;font-size:1rem;font-style:italic;grid-column:1/-1;padding:24px 0;">Nothing added yet.</p>'; return; }
    items.forEach(item => {
      var card = category === 'beats' ? buildBeatCard(item) : buildMovieCard(item, category);
      if (card) grid.appendChild(card);
    });
  } catch(e) { grid.classList.remove('mhf-skeleton-grid'); grid.innerHTML='<p class="error-text" style="grid-column:1/-1;">Could not load.</p>'; }
}
</script>
